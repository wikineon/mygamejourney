<!DOCTYPE html>

<html>
<head>
  <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
  <title>My Terraria Journey</title>
  <link href="https://fonts.googleapis.com/css2?family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&family=Playwrite+GB+J:ital,wght@0,100..400;1,100..400&display=swap">
</head>
  <style>
       body{
         background-color: rgb(0, 125, 78);
         font-family: "Playwrite GB J", cursive;
         font-optical-sizing: auto;
         font-style: normal;
         
       }
  
  
  img{
    height:30px;
    display:flex;
    float:left;
    gap:20px;
    margin:15px;
    border: 1px solid black;
    padding:10px;
    border-radius:10px;
    font-weight:bold;
  }
  
  #playgame{
    width:280px;
    text-align:center;
    font-size:20px;
    padding:20px;
    border:none;
    background-color:black;
    color:white;
    border-radius:20px;
    font-weight:700;
    margin: 35px;
  }
  
  #website{
    background-color:white;
    color:black;
    font-size:20px;
    font-weight:700;
    width:280px;
    padding:15px;
    margin:35px;
    border-radius:20px;
    border:none;
    transition:opacity 0.2s;
  }
  
  #webiste:hover{
    background-color: rgba(255, 255, 255,.0.4)
  }
  
  #webiste:active{
    opacity:0.3;
  }
  
  a{
    text-decoration:none;
  }
  
  ul{
    background-color: rgba(255, 255, 255, 0.3);
    padding:15px;
    border-radius:20px;
    font-weight:600;
    color: black;
  }
  
  li{
    list-style-type:none;
  }
  
  h2{
    background-color: rgba(255, 255, 255,.0.3);
    width:auto;
  }
  
  #center{
    font-weight:600;
    color: black;
    background-color: white;
    margin:0px;
    border-radius: 0 0 20px 20px;
    padding:15px;
    
  }
  
  #first{
        color:white;
        background-color:black;
        font-weight:500;
        border-radius: 0 0 20px 20px;
        margin:0px;
        height:200px;   
        padding:85px;    
  }
  
  
  @font-face{
    font-family: Playwrite;
    src: url(PlaywriteGBJ-VariableFont_wght.ttf);
  }

h1{
  margin:40px;
  

  </style>
<body>
  <header>
    <h1 id="first">My Terraria Journey.</h1>
  </header>

  <ul>
    <li>Eye of Cthulhu</li>
    <li>Skeletron</li>
    <li>Eater of Worlds</li>
    <li>Wall of flesh</li>

  </ul>
  <p>
    My World
  </p>
  
  
  <footer id="firstendbox">
    <a href="https://play.google.com/store/apps/details?id=com.and.games505.TerrariaPaid">

    </a>
    <a href="https://www.terraria.org">
    <button id="website">Game website</button>
    </a>
  </footer>
  <h1 id="lasttext">Find me on</h1>
  <footer id="secondendbox">
    <img src="icons/discord.png">
